# fly.toml app configuration file generated for vidflix-mapeldorf on 2026-03-10T17:21:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "vidflix-mapeldorf"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/vidflix.db"
  PORT = "8080"
  ALLOWED_ORIGIN = "https://vidflix-mapeldorf.fly.dev"

[[mounts]]
  source = "vidflix_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# WebTorrent needs UDP for DHT and peer discovery
[[services]]
  protocol = "udp"
  internal_port = 6881

  [[services.ports]]
    port = 6881

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
