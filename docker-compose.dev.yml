services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/data
    env_file:
      - .env
    environment:
      DB_PATH: /data/vidflix.db
      PORT: "3000"
      NODE_ENV: development
    restart: on-failure

volumes:
  sqlite-data:
    driver: local
