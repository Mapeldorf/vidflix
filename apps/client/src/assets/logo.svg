<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D00"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap');
    </style>
  </defs>

  <!-- Icon: clean rounded square -->
  <rect x="0" y="10" width="96" height="96" rx="24" ry="24" fill="url(#iconGrad)"/>

  <!-- Play triangle -->
  <polygon points="36,38 36,78 74,58" fill="white"/>

  <!-- Wordmark (white "Vid" for dark backgrounds) -->
  <text x="116" y="82"
        font-family="'Nunito', 'Arial Rounded MT Bold', 'Trebuchet MS', sans-serif"
        font-size="66"
        font-weight="800"
        letter-spacing="-1">
    <tspan fill="white">Vid</tspan><tspan fill="#FF4500">flix</tspan>
  </text>
</svg>
