
    <div class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
      <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
          <img src="/logo.svg" alt="VidFlix" class="h-16 w-auto block mx-auto" />
          <p class="text-gray-400 mt-1">Inicia sesión para continuar</p>
        </div>

        <!-- Card -->
        <div
          class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl"
        >
          <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <!-- Login (username or email) -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-300 mb-1.5">
                Usuario
              </label>
              <input
                formControlName="login"
                type="text"
                autocomplete="username"
                placeholder="tu nombre"
                class="w-full bg-gray-800 border rounded-lg px-4 py-3 text-white placeholder-gray-500
                       focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                [class.border-red-500]="fieldInvalid('login')"
                [class.border-gray-700]="!fieldInvalid('login')"
              />
              @if (fieldInvalid('login')) {
              <p class="text-red-400 text-xs mt-1">Campo obligatorio</p>
              }
            </div>

            <!-- Password -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-300 mb-1.5">
                Contraseña
              </label>
              <input
                formControlName="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                class="w-full bg-gray-800 border rounded-lg px-4 py-3 text-white placeholder-gray-500
                       focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                [class.border-red-500]="fieldInvalid('password')"
                [class.border-gray-700]="!fieldInvalid('password')"
              />
              @if (fieldInvalid('password')) {
              <p class="text-red-400 text-xs mt-1">Campo obligatorio</p>
              }
            </div>

            <!-- Error -->
            @if (error()) {
            <div
              class="mb-5 bg-red-900/30 border border-red-800 rounded-lg px-4 py-3 text-red-300 text-sm"
            >
              {{ error() }}
            </div>
            }

            <!-- Submit -->
            <button
              type="submit"
              [disabled]="loading()"
              class="w-full bg-gray-700 hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed
                     text-white font-semibold py-3 rounded-lg transition-colors"
            >
              @if (loading()) {
              <span class="flex items-center justify-center gap-2">
                <svg
                  class="animate-spin h-4 w-4"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  />
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8v8z"
                  />
                </svg>
                Iniciando sesión...
              </span>
              } @else { Iniciar sesión }
            </button>
          </form>

          <!-- Register link -->
          <p class="text-center text-gray-400 text-sm mt-6">
            ¿No tienes cuenta?
            <a
              routerLink="/registro"
              class="text-gray-300 hover:text-gray-200 font-medium ml-1"
            >
              Regístrate
            </a>
          </p>
        </div>
      </div>
    </div>
