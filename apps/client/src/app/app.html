@if (auth.isAuthenticated()) {
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">

        <!-- Logo -->
        <a routerLink="/buscar" (click)="cerrarMenu()">
          <img src="/logo.svg" alt="VidFlix" class="h-9 w-auto" />
        </a>

        <!-- Desktop nav -->
        <div class="hidden sm:flex items-center gap-6">
          <a
            routerLink="/buscar"
            routerLinkActive="text-white"
            class="text-gray-400 hover:text-white transition-colors font-medium"
          >
            Buscar
          </a>
          <a
            routerLink="/biblioteca"
            routerLinkActive="text-white"
            class="text-gray-400 hover:text-white transition-colors font-medium"
          >
            Mi Biblioteca
          </a>
          <div class="flex items-center gap-3 border-l border-gray-700 pl-6">
            <span class="text-gray-400 text-sm">{{ auth.currentUser()?.username }}</span>
            <button
              (click)="logout()"
              class="text-sm text-gray-400 hover:text-orange-400 transition-colors font-medium"
            >
              Cerrar sesión
            </button>
          </div>
        </div>

        <!-- Mobile: botón hamburguesa -->
        <button
          class="sm:hidden flex flex-col justify-center items-center w-10 h-10 gap-1.5 text-gray-400 hover:text-white transition-colors"
          (click)="menuAbierto.set(!menuAbierto())"
          aria-label="Menú"
        >
          <span
            class="block w-6 h-0.5 bg-current transition-all duration-200"
            [class.rotate-45]="menuAbierto()"
            [class.translate-y-2]="menuAbierto()"
          ></span>
          <span
            class="block w-6 h-0.5 bg-current transition-all duration-200"
            [class.opacity-0]="menuAbierto()"
          ></span>
          <span
            class="block w-6 h-0.5 bg-current transition-all duration-200"
            [class.-rotate-45]="menuAbierto()"
            [class.-translate-y-2]="menuAbierto()"
          ></span>
        </button>

      </div>
    </div>

    <!-- Mobile menu desplegable -->
    @if (menuAbierto()) {
    <div class="sm:hidden border-t border-gray-800 px-4 py-3 flex flex-col gap-1">
      <a
        routerLink="/buscar"
        routerLinkActive="text-white !bg-gray-800"
        (click)="cerrarMenu()"
        class="text-gray-400 hover:text-white hover:bg-gray-800 transition-colors font-medium px-3 py-2.5 rounded-lg"
      >
        Buscar
      </a>
      <a
        routerLink="/biblioteca"
        routerLinkActive="text-white !bg-gray-800"
        (click)="cerrarMenu()"
        class="text-gray-400 hover:text-white hover:bg-gray-800 transition-colors font-medium px-3 py-2.5 rounded-lg"
      >
        Mi Biblioteca
      </a>
      <div class="border-t border-gray-800 mt-2 pt-3 flex items-center justify-between">
        <span class="text-gray-500 text-sm">{{ auth.currentUser()?.username }}</span>
        <button
          (click)="logout()"
          class="text-sm text-gray-400 hover:text-orange-400 transition-colors font-medium"
        >
          Cerrar sesión
        </button>
      </div>
    </div>
    }
  </nav>
}

<main class="min-h-screen bg-gray-950 text-white">
  <router-outlet></router-outlet>
</main>
